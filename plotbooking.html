<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Smaya Developers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0F1D2E; --gold: #FFD700; --cream: #F5F3F0; --red: #ef4444; --green: #22c55e; --text-gray: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: var(--dark); color: white; padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { color: var(--gold); font-size: 22px; margin-bottom: 40px; text-align: center; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 20px; }
        .nav-item { padding: 14px 18px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--gold); color: var(--dark); }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 20px; font-weight: 700; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-gray); }
        input, select, textarea { padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn-gold { background: var(--dark); color: var(--gold); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; background: #f8fafc; font-size: 13px; text-transform: uppercase; color: var(--text-gray); }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .actions-cell i { cursor: pointer; margin-right: 12px; transition: 0.2s; }
        .actions-cell i:hover { color: var(--gold); }
        
        .plot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; margin-top: 20px; }
        .plot-box { padding: 20px 10px; border-radius: 12px; text-align: center; font-weight: 700; cursor: pointer; border: 2px solid #e2e8f0; }
        .plot-box.available { background: #f0fdf4; color: #16a34a; border-color: #16a34a; }
        .plot-box.sold { background: #fef2f2; color: #ef4444; border-color: #ef4444; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SMAYA ADMIN</h2>
    <div class="nav-item active" id="nav-projects"><i class="fas fa-layer-group"></i> Projects</div>
    <div class="nav-item" id="nav-inventory"><i class="fas fa-map-marked-alt"></i> Site Inventory</div>
    <div class="nav-item" id="nav-sales"><i class="fas fa-hand-holding-usd"></i> Sales Log</div>
    <div class="nav-item" id="nav-enquiry"><i class="fas fa-bell"></i> Web Inquiries</div>
</div>

<div class="main-content">
    
    <div id="sec-projects" class="section active">
        <h1>Project Directory</h1>
        <div class="card">
            <h3 id="formTitle">Manage Property</h3>
            <form id="pForm" class="form-grid">
                <input type="hidden" id="pId">
                <div class="form-group"><label>Project Name</label><input type="text" id="pName" required></div>
                <div class="form-group"><label>Authority Approval</label><input type="text" id="pApproval"></div>
                <div class="form-group"><label>RERA Status</label><input type="text" id="pRera"></div>
                <div class="form-group"><label>Total Sites</label><input type="number" id="pTotalSites" required></div>
                <div class="form-group"><label>Site Dimension</label><input type="text" id="pDimension"></div>
                <div class="form-group"><label>Facing</label><input type="text" id="pFacing"></div>
                <div class="form-group"><label>Land Area</label><input type="text" id="pArea"></div>
                <div class="form-group"><label>Google Map Link</label><input type="url" id="pMapLink"></div>
                <div class="form-group full-width"><label>Location Address</label><input type="text" id="pAddress"></div>
                <div class="form-group full-width"><label>Project Highlights</label><textarea id="pHighlights" rows="2"></textarea></div>
                <div class="form-group"><label>Plot Map Image URL</label><input type="url" id="pPlotImg"></div>
                <div class="form-group"><label>Gallery Images (CSV)</label><input type="url" id="pGalleryImgs"></div>
                
                <div class="full-width">
                    <button type="submit" class="btn btn-gold"><i class="fas fa-save"></i> Save Property</button>
                    <button type="button" class="btn" id="cancelBtn" style="display:none;">Cancel</button>
                </div>
            </form>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Project Name</th><th>Sites</th><th>Approval</th><th>Actions</th></tr></thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-inventory" class="section">
        <h1>Site Inventory</h1>
        <div class="card">
            <label>Select Project</label>
            <select id="invSelect"></select>
            <div id="invGrid" class="plot-grid"></div>
        </div>
    </div>

    <div id="sec-sales" class="section">
        <h1>Sales & Customer Log</h1>
        <div class="card">
            <h3 id="saleFormTitle">Record/Edit Sale</h3>
            <form id="salesForm" class="form-grid">
                <input type="hidden" id="saleId">
                <div class="form-group"><label>Project</label><select id="saleProj" required></select></div>
                <div class="form-group"><label>Plot Number</label><input type="number" id="salePlot" required></div>
                <div class="form-group"><label>Buyer Name</label><input type="text" id="buyerName" required></div>
                <div class="form-group"><label>Contact Number</label><input type="tel" id="buyerPhone" required></div>
                <div class="full-width">
                    <button type="submit" class="btn btn-gold" id="saleSubmitBtn">Confirm Sale</button>
                    <button type="button" class="btn" id="saleCancelBtn" style="display:none;">Cancel</button>
                </div>
            </form>
        </div>
        <div class="card">
            <div style="margin-bottom: 20px;">
                <label>Filter by Project:</label>
                <select id="saleFilter"></select>
            </div>
            <table>
                <thead><tr><th>Project</th><th>Plot</th><th>Buyer</th><th>Phone</th><th>Actions</th></tr></thead>
                <tbody id="salesTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-enquiry" class="section">
        <h1>Website Inquiries</h1>
        <div class="card">
            <table><thead><tr><th>Customer</th><th>Phone</th><th>Project</th><th>Plot</th></tr></thead><tbody id="enquiryTableBody"></tbody></table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBizlZkXOH8TUjXrlqShfcaclYQHUI352c",
        authDomain: "dark-valor-452618-u5.firebaseapp.com",
        projectId: "dark-valor-452618-u5",
        storageBucket: "dark-valor-452618-u5.firebasestorage.app",
        messagingSenderId: "216503837658",
        appId: "1:216503837658:web:e0bda55bfbf27cddbf16e3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let projectCapacities = {};
    let currentSalesListener = null;

    // UI Navigation
    const showSec = (id, element) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        element.classList.add('active');
    };

    document.getElementById('nav-projects').onclick = (e) => showSec('sec-projects', e.currentTarget);
    document.getElementById('nav-inventory').onclick = (e) => showSec('sec-inventory', e.currentTarget);
    document.getElementById('nav-sales').onclick = (e) => showSec('sec-sales', e.currentTarget);
    document.getElementById('nav-enquiry').onclick = (e) => showSec('sec-enquiry', e.currentTarget);

    // Sync Projects and Dropdowns
    onSnapshot(collection(db, "projects"), (snap) => {
        const tbody = document.getElementById('pTableBody');
        const invSel = document.getElementById('invSelect');
        const saleSel = document.getElementById('saleProj');
        const filterSel = document.getElementById('saleFilter');
        
        tbody.innerHTML = "";
        invSel.innerHTML = saleSel.innerHTML = '<option value="">-- Select Project --</option>';
        filterSel.innerHTML = '<option value="">-- Select Project to View Log --</option>';
        projectCapacities = {};

        snap.forEach(d => {
            const p = d.data();
            projectCapacities[d.id] = p.sites; 
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.sites}</td><td>${p.approval}</td><td><i class="fas fa-edit" onclick="editProj('${d.id}')"></i> <i class="fas fa-trash" onclick="delProj('${d.id}')"></i></td></tr>`;
            invSel.innerHTML += `<option value="${d.id}" data-sites="${p.sites}">${p.name}</option>`;
            saleSel.innerHTML += `<option value="${d.id}">${p.name}</option>`;
            filterSel.innerHTML += `<option value="${d.id}">${p.name}</option>`;
        });
    });

    // --- SALES LOGIC (projects > {pid} > sales > {pNum}) ---
    const sForm = document.getElementById('salesForm');
    sForm.onsubmit = async (e) => {
        e.preventDefault();
        const pid = document.getElementById('saleProj').value;
        const pName = document.getElementById('saleProj').selectedOptions[0].text;
        const pNum = document.getElementById('salePlot').value;
        
        // Validation
        const maxSites = projectCapacities[pid];
        if (parseInt(pNum) > maxSites || parseInt(pNum) < 1) {
            alert(`Error: This project only has ${maxSites} sites.`);
            return;
        }

        const saleData = { 
            projectId: pid,
            project: pName, 
            plot: pNum, 
            buyer: document.getElementById('buyerName').value, 
            phone: document.getElementById('buyerPhone').value, 
            timestamp: new Date() 
        };

        try {
            // Using setDoc with pNum as the ID automatically handles "Add" vs "Edit"
            // If plot 5 exists, it updates. If not, it creates it.
            await setDoc(doc(db, "projects", pid, "sales", pNum), saleData);
            alert(`Success: Plot ${pNum} has been registered/updated.`);
            window.resetSalesForm();
        } catch (err) {
            console.error(err);
            alert("Error saving sale.");
        }
    };

    window.renderSalesTable = () => {
        const pid = document.getElementById('saleFilter').value;
        const tbody = document.getElementById('salesTableBody');
        
        if (currentSalesListener) currentSalesListener();
        tbody.innerHTML = "";

        if (!pid) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>Select a project to view its sales log</td></tr>";
            return;
        }

        const q = query(collection(db, "projects", pid, "sales"), orderBy("timestamp", "desc"));
        currentSalesListener = onSnapshot(q, (snap) => {
            tbody.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                tbody.innerHTML += `<tr>
                    <td>${s.project}</td>
                    <td><b>#${s.plot}</b></td>
                    <td>${s.buyer}</td>
                    <td>${s.phone}</td>
                    <td>
                        <i class="fas fa-edit" onclick="editSale('${pid}', '${d.id}')" title="Edit Plot ${d.id}"></i> 
                        <i class="fas fa-trash" style="color:red" onclick="delSale('${pid}', '${d.id}')"></i>
                    </td>
                </tr>`;
            });
        });
    };
    document.getElementById('saleFilter').onchange = window.renderSalesTable;

    window.editSale = async (pid, plotId) => {
        const d = await getDoc(doc(db, "projects", pid, "sales", plotId));
        const s = d.data();
        document.getElementById('saleProj').value = pid;
        document.getElementById('salePlot').value = s.plot;
        document.getElementById('buyerName').value = s.buyer;
        document.getElementById('buyerPhone').value = s.phone;
        document.getElementById('saleFormTitle').innerText = `Editing Plot #${plotId}`;
        document.getElementById('saleCancelBtn').style.display = "inline";
        document.getElementById('saleSubmitBtn').innerText = "Update Sale Record";
    };

    window.delSale = (pid, plotId) => { 
        if(confirm(`Are you sure you want to delete the record for Plot ${plotId}?`)) {
            deleteDoc(doc(db, "projects", pid, "sales", plotId)); 
        }
    };

    window.resetSalesForm = () => { 
        sForm.reset(); 
        document.getElementById('saleFormTitle').innerText = "Record/Edit Sale"; 
        document.getElementById('saleCancelBtn').style.display = "none"; 
        document.getElementById('saleSubmitBtn').innerText = "Confirm Sale";
    };
    document.getElementById('saleCancelBtn').onclick = window.resetSalesForm;

    // --- INVENTORY GRID LOGIC ---
    window.renderInventory = () => {
        const sel = document.getElementById('invSelect');
        const pid = sel.value;
        if(!pid) return;
        const total = parseInt(sel.options[sel.selectedIndex].dataset.sites);
        const grid = document.getElementById('invGrid');

        onSnapshot(collection(db, "projects", pid, "plots"), (snap) => {
            grid.innerHTML = "";
            let statusMap = {};
            snap.forEach(d => statusMap[d.id] = d.data().status);
            for(let i=1; i<=total; i++) {
                const s = statusMap[i] || 'available';
                const div = document.createElement('div');
                div.className = `plot-box ${s}`; div.innerText = i;
                div.onclick = () => setDoc(doc(db, "projects", pid, "plots", i.toString()), { status: s === 'available' ? 'sold' : 'available' });
                grid.appendChild(div);
            }
        });
    };
    document.getElementById('invSelect').onchange = window.renderInventory;

    // --- PROJECT MANAGEMENT ---
    const pForm = document.getElementById('pForm');
    pForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('pId').value;
        const pData = {
            name: document.getElementById('pName').value,
            approval: document.getElementById('pApproval').value,
            rera: document.getElementById('pRera').value,
            sites: parseInt(document.getElementById('pTotalSites').value),
            dimension: document.getElementById('pDimension').value,
            facing: document.getElementById('pFacing').value,
            area: document.getElementById('pArea').value,
            mapLink: document.getElementById('pMapLink').value,
            address: document.getElementById('pAddress').value,
            highlights: document.getElementById('pHighlights').value,
            plotImg: document.getElementById('pPlotImg').value,
            gallery: document.getElementById('pGalleryImgs').value
        };
        
        try {
            id ? await updateDoc(doc(db, "projects", id), pData) : await addDoc(collection(db, "projects"), pData);
            alert("Project database updated.");
            pForm.reset();
            document.getElementById('pId').value = "";
            document.getElementById('cancelBtn').style.display = "none";
        } catch (err) {
            console.error(err);
        }
    };

    window.editProj = async (id) => {
        const d = await getDoc(doc(db, "projects", id));
        const p = d.data();
        document.getElementById('pId').value = id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pApproval').value = p.approval || "";
        document.getElementById('pRera').value = p.rera || "";
        document.getElementById('pTotalSites').value = p.sites;
        document.getElementById('pDimension').value = p.dimension || "";
        document.getElementById('pFacing').value = p.facing || "";
        document.getElementById('pArea').value = p.area || "";
        document.getElementById('pMapLink').value = p.mapLink || "";
        document.getElementById('pAddress').value = p.address || "";
        document.getElementById('pHighlights').value = p.highlights || "";
        document.getElementById('pPlotImg').value = p.plotImg || "";
        document.getElementById('pGalleryImgs').value = p.gallery || "";
        document.getElementById('cancelBtn').style.display = "inline";
    };

    window.delProj = (id) => { if(confirm("Delete Project? This will not delete sub-collections.")) deleteDoc(doc(db, "projects", id)); };

    // --- WEB ENQUIRIES ---
    onSnapshot(query(collection(db, "enquiries"), orderBy("timestamp", "desc")), (snap) => {
        const body = document.getElementById('enquiryTableBody');
        body.innerHTML = "";
        snap.forEach(d => {
            const e = d.data();
            body.innerHTML += `<tr><td>${e.name}</td><td>${e.phone}</td><td>${e.project}</td><td>${e.plot}</td></tr>`;
        });
    });

</script>
</body>
</html>
