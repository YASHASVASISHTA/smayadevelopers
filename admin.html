<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Smaya Developers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dark: #0F1D2E; --gold: #FFD700; --cream: #F5F3F0; --red: #ef4444; --green: #22c55e; --text-gray: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: var(--dark); color: white; padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { color: var(--gold); font-size: 22px; margin-bottom: 40px; text-align: center; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 20px; }
        .nav-item { padding: 14px 18px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--gold); color: var(--dark); }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 20px; font-weight: 700; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-gray); }
        input, select, textarea { padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); outline: none; }
        
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; margin-right: 10px; }
        .btn-gold { background: var(--dark); color: var(--gold); }
        .btn-cancel { background: #f1f5f9; color: var(--dark); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; background: #f8fafc; font-size: 13px; text-transform: uppercase; color: var(--text-gray); }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        td i { cursor: pointer; margin-right: 12px; transition: 0.2s; font-size: 15px; }
        td i:hover { opacity: 0.7; }
        
        .plot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; margin-top: 20px; }
        .plot-box { padding: 20px 10px; border-radius: 12px; text-align: center; font-weight: 700; cursor: pointer; border: 2px solid #e2e8f0; transition: 0.2s; }
        .plot-box.available { background: #f0fdf4; color: #16a34a; border-color: #16a34a; }
        .plot-box.sold { background: #fef2f2; color: #ef4444; border-color: #ef4444; }

        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-completed   { background: #dcfce7; color: #16a34a; }
        .badge-upcoming    { background: #dbeafe; color: #1d4ed8; }
        .badge-ongoing     { background: #fef9c3; color: #a16207; }
        .badge-approved    { background: #dcfce7; color: #16a34a; }
        .badge-notapproved { background: #fef2f2; color: #ef4444; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SMAYA ADMIN</h2>
    <div class="nav-item active" id="nav-projects"><i class="fas fa-layer-group"></i> Projects</div>
    <div class="nav-item" id="nav-inventory"><i class="fas fa-map-marked-alt"></i> Site Inventory</div>
    <div class="nav-item" id="nav-sales"><i class="fas fa-hand-holding-usd"></i> Sales Log</div>
    <div class="nav-item" id="nav-enquiry"><i class="fas fa-bell"></i> Web Inquiries</div>
</div>

<div class="main-content">

    <!-- PROJECTS -->
    <div id="sec-projects" class="section active">
        <h1>Project Directory</h1>
        <div class="card">
            <h3 id="formTitle" style="margin-bottom:20px;">Add / Edit Property</h3>
            <form id="pForm" class="form-grid">
                <input type="hidden" id="pId">
                <div class="form-group"><label>Project Name</label><input type="text" id="pName" required></div>
                <div class="form-group"><label>Authority Approval</label><input type="text" id="pApproval"></div>

                <div class="form-group">
                    <label>RERA Status</label>
                    <select id="pRera">
                        <option value="">-- Select RERA Status --</option>
                        <option value="Approved">Approved</option>
                        <option value="Not Approved">Not Approved</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Project Progress</label>
                    <select id="pProgress">
                        <option value="">-- Select Progress --</option>
                        <option value="Upcoming">Upcoming</option>
                        <option value="Ongoing">Ongoing</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <div class="form-group"><label>Total Sites</label><input type="number" id="pTotalSites" required></div>
                <div class="form-group"><label>Site Dimension</label><input type="text" id="pDimension"></div>
                <div class="form-group"><label>Facing</label><input type="text" id="pFacing"></div>
                <div class="form-group"><label>Land Area</label><input type="text" id="pArea"></div>
                <div class="form-group"><label>Google Map Link</label><input type="url" id="pMapLink"></div>
                <div class="form-group full-width"><label>Location Address</label><input type="text" id="pAddress"></div>
                <div class="form-group full-width"><label>Project Highlights</label><textarea id="pHighlights" rows="2"></textarea></div>
                <div class="form-group"><label>Upload Plot Map (Image File)</label><input type="file" id="pPlotImgFile" accept="image/*"></div>
                <div class="form-group"><label>Upload Gallery Images (Multiple)</label><input type="file" id="pGalleryImgsFile" accept="image/*" multiple></div>
                <div class="full-width">
                    <button type="submit" id="saveProjBtn" class="btn btn-gold"><i class="fas fa-save"></i> Save Property</button>
                    <button type="button" class="btn btn-cancel" id="cancelBtn" style="display:none;"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Project Name</th><th>Sites</th><th>Approval</th><th>RERA</th><th>Progress</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- INVENTORY -->
    <div id="sec-inventory" class="section">
        <h1>Site Inventory</h1>
        <div class="card">
            <div class="form-group" style="max-width:320px; margin-bottom:20px;">
                <label>Select Project</label>
                <select id="invSelect"></select>
            </div>
            <div id="invGrid" class="plot-grid"></div>
        </div>
    </div>

    <!-- SALES -->
    <div id="sec-sales" class="section">
        <h1>Sales &amp; Customer Log</h1>
        <div class="card">
            <h3 style="margin-bottom:20px;">Record Sale</h3>
            <form id="salesForm" class="form-grid">
                <input type="hidden" id="saleId">
                <div class="form-group"><label>Project</label><select id="saleProj" required></select></div>
                <div class="form-group"><label>Plot Number</label><input type="number" id="salePlot" required></div>
                <div class="form-group"><label>Buyer Name</label><input type="text" id="buyerName" required></div>
                <div class="form-group"><label>Contact Number</label><input type="tel" id="buyerPhone" required></div>
                <div class="full-width">
                    <button type="submit" class="btn btn-gold" id="saleSubmitBtn"><i class="fas fa-check"></i> Confirm Sale</button>
                </div>
            </form>
        </div>
        <div class="card">
            <div class="form-group" style="max-width:320px; margin-bottom:20px;">
                <label>Filter by Project</label>
                <select id="saleFilter"></select>
            </div>
            <table>
                <thead><tr><th>Project</th><th>Plot</th><th>Buyer</th><th>Phone</th><th>Actions</th></tr></thead>
                <tbody id="salesTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ENQUIRIES -->
    <div id="sec-enquiry" class="section">
        <h1>Website Inquiries</h1>
        <div class="card">
            <table>
                <thead><tr><th>Customer</th><th>Phone</th><th>Project</th><th>Plot</th></tr></thead>
                <tbody id="enquiryTableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
        getFirestore, collection, addDoc, onSnapshot,
        doc, setDoc, deleteDoc, updateDoc, getDoc, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ── Firebase ───────────────────────────────────────────────────
    const app = initializeApp({
        apiKey: "AIzaSyBizlZkXOH8TUjXrlqShfcaclYQHUI352c",
        authDomain: "dark-valor-452618-u5.firebaseapp.com",
        projectId: "dark-valor-452618-u5",
        storageBucket: "dark-valor-452618-u5.firebasestorage.app",
        messagingSenderId: "216503837658",
        appId: "1:216503837658:web:e0bda55bfbf27cddbf16e3"
    });
    const db = getFirestore(app);

    // ── Supabase ───────────────────────────────────────────────────
    const sbClient = supabase.createClient(
        'https://gbljrqafoadnjlbrpfnc.supabase.co',
        'sb_publishable_d51RkB5ZWksC-tG4AkL-yQ_mrrtXyUY'
    );

    let currentSalesListener = null;
    let invListener = null;

    // ── Supabase upload ────────────────────────────────────────────
    async function uploadToSupabase(file, folder) {
        const path = `${folder}/${Date.now()}_${file.name.replace(/\s/g, '_')}`;
        const { error } = await sbClient.storage.from('project-images').upload(path, file);
        if (error) throw error;
        return sbClient.storage.from('project-images').getPublicUrl(path).data.publicUrl;
    }

    // ── Badge helpers ──────────────────────────────────────────────
    function progressBadge(v) {
        if (!v) return '<span style="color:#aaa">—</span>';
        const cls = { Completed: 'badge-completed', Upcoming: 'badge-upcoming', Ongoing: 'badge-ongoing' }[v] || '';
        return `<span class="badge ${cls}">${v}</span>`;
    }
    function reraBadge(v) {
        if (!v) return '<span style="color:#aaa">—</span>';
        return `<span class="badge ${v === 'Approved' ? 'badge-approved' : 'badge-notapproved'}">${v}</span>`;
    }

    // ── Navigation ─────────────────────────────────────────────────
    document.getElementById('nav-projects').onclick  = e => showSec('sec-projects',  e.currentTarget);
    document.getElementById('nav-inventory').onclick = e => showSec('sec-inventory', e.currentTarget);
    document.getElementById('nav-sales').onclick     = e => showSec('sec-sales',     e.currentTarget);
    document.getElementById('nav-enquiry').onclick   = e => showSec('sec-enquiry',   e.currentTarget);

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // ── Live Projects → table + dropdowns ─────────────────────────
    onSnapshot(collection(db, "projects"), snap => {
        const tbody     = document.getElementById('pTableBody');
        const invSel    = document.getElementById('invSelect');
        const saleSel   = document.getElementById('saleProj');
        const filterSel = document.getElementById('saleFilter');

        tbody.innerHTML     = "";
        invSel.innerHTML    = '<option value="">-- Select Project --</option>';
        saleSel.innerHTML   = '<option value="">-- Select Project --</option>';
        filterSel.innerHTML = '<option value="">-- Select Project to View Log --</option>';

        snap.forEach(d => {
            const p = d.data();
            tbody.innerHTML += `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.sites}</td>
                    <td>${p.approval || '—'}</td>
                    <td>${reraBadge(p.rera)}</td>
                    <td>${progressBadge(p.progress)}</td>
                    <td>
                        <i class="fas fa-edit"  style="color:#0F1D2E" data-id="${d.id}" data-action="edit-proj"></i>
                        <i class="fas fa-trash" style="color:#ef4444" data-id="${d.id}" data-action="del-proj"></i>
                    </td>
                </tr>`;
            const opt = `<option value="${d.id}" data-sites="${p.sites}">${p.name}</option>`;
            invSel.innerHTML    += opt;
            saleSel.innerHTML   += opt;
            filterSel.innerHTML += `<option value="${d.id}">${p.name}</option>`;
        });
    });

    // Delegated click on projects table
    document.getElementById('pTableBody').addEventListener('click', async e => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const id = el.dataset.id;

        if (el.dataset.action === 'del-proj') {
            if (confirm("Delete this project?")) await deleteDoc(doc(db, "projects", id));

        } else if (el.dataset.action === 'edit-proj') {
            const snap = await getDoc(doc(db, "projects", id));
            const p    = snap.data();
            document.getElementById('pId').value         = id;
            document.getElementById('pName').value       = p.name       || "";
            document.getElementById('pApproval').value   = p.approval   || "";
            document.getElementById('pRera').value       = p.rera       || "";
            document.getElementById('pProgress').value   = p.progress   || "";
            document.getElementById('pTotalSites').value = p.sites      || "";
            document.getElementById('pDimension').value  = p.dimension  || "";
            document.getElementById('pFacing').value     = p.facing     || "";
            document.getElementById('pArea').value       = p.area       || "";
            document.getElementById('pMapLink').value    = p.mapLink    || "";
            document.getElementById('pAddress').value    = p.address    || "";
            document.getElementById('pHighlights').value = p.highlights || "";
            document.getElementById('cancelBtn').style.display = "inline-flex";
            document.getElementById('formTitle').textContent   = "Edit Property";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    // ── Project form submit ────────────────────────────────────────
    document.getElementById('pForm').onsubmit = async e => {
        e.preventDefault();
        const saveBtn = document.getElementById('saveProjBtn');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        try {
            const id         = document.getElementById('pId').value;
            let plotImgUrl   = "";
            let galleryUrls  = [];   // ← stored as array

            const mapFile = document.getElementById('pPlotImgFile').files[0];
            if (mapFile) plotImgUrl = await uploadToSupabase(mapFile, 'maps');

            for (const file of document.getElementById('pGalleryImgsFile').files) {
                galleryUrls.push(await uploadToSupabase(file, 'gallery'));
            }

            const pData = {
                name:       document.getElementById('pName').value,
                approval:   document.getElementById('pApproval').value,
                rera:       document.getElementById('pRera').value,       // dropdown
                progress:   document.getElementById('pProgress').value,   // dropdown
                sites:      parseInt(document.getElementById('pTotalSites').value),
                dimension:  document.getElementById('pDimension').value,
                facing:     document.getElementById('pFacing').value,
                area:       document.getElementById('pArea').value,
                mapLink:    document.getElementById('pMapLink').value,
                address:    document.getElementById('pAddress').value,
                highlights: document.getElementById('pHighlights').value,
                updatedAt:  new Date()
            };
            if (plotImgUrl)         pData.plotImg = plotImgUrl;
            if (galleryUrls.length) pData.gallery = galleryUrls;  // ← array format

            if (id) {
                await updateDoc(doc(db, "projects", id), pData);
            } else {
                await addDoc(collection(db, "projects"), pData);
            }

            alert("Project saved successfully.");
            document.getElementById('pForm').reset();
            document.getElementById('pId').value               = "";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('formTitle').textContent   = "Add / Edit Property";
        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Property';
        }
    };

    document.getElementById('cancelBtn').onclick = () => {
        document.getElementById('pForm').reset();
        document.getElementById('pId').value               = "";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('formTitle').textContent   = "Add / Edit Property";
    };

    // ── Sales form submit ──────────────────────────────────────────
    document.getElementById('salesForm').onsubmit = async e => {
        e.preventDefault();
        const pid   = document.getElementById('saleProj').value;
        const pName = document.getElementById('saleProj').selectedOptions[0].text;
        const pNum  = document.getElementById('salePlot').value;
        if (!pid) { alert("Please select a project."); return; }

        await setDoc(doc(db, "projects", pid, "sales", pNum), {
            projectId: pid,
            project:   pName,
            plot:      pNum,
            buyer:     document.getElementById('buyerName').value,
            phone:     document.getElementById('buyerPhone').value,
            timestamp: new Date()
        });
        // auto-mark plot as sold in inventory
        await setDoc(doc(db, "projects", pid, "plots", pNum), { status: 'sold' });

        alert(`Plot #${pNum} registered successfully.`);
        document.getElementById('salesForm').reset();
    };

    // ── Sales filter table ─────────────────────────────────────────
    document.getElementById('saleFilter').onchange = () => {
        const pid   = document.getElementById('saleFilter').value;
        const tbody = document.getElementById('salesTableBody');
        if (currentSalesListener) { currentSalesListener(); currentSalesListener = null; }
        tbody.innerHTML = "";
        if (!pid) return;

        currentSalesListener = onSnapshot(
            query(collection(db, "projects", pid, "sales"), orderBy("timestamp", "desc")),
            snap => {
                tbody.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    tbody.innerHTML += `
                        <tr>
                            <td>${s.project}</td>
                            <td>#${s.plot}</td>
                            <td>${s.buyer}</td>
                            <td>${s.phone}</td>
                            <td><i class="fas fa-trash" style="color:#ef4444;" data-pid="${pid}" data-sid="${d.id}" data-action="del-sale"></i></td>
                        </tr>`;
                });
            }
        );
    };

    // Delegated delete on sales table
    document.getElementById('salesTableBody').addEventListener('click', async e => {
        const el = e.target.closest('[data-action="del-sale"]');
        if (!el) return;
        if (confirm("Delete this sale record?")) {
            await deleteDoc(doc(db, "projects", el.dataset.pid, "sales", el.dataset.sid));
        }
    });

    // ── Inventory grid ─────────────────────────────────────────────
    document.getElementById('invSelect').onchange = () => {
        const sel   = document.getElementById('invSelect');
        const pid   = sel.value;
        const total = parseInt(sel.options[sel.selectedIndex]?.dataset.sites) || 0;
        const grid  = document.getElementById('invGrid');
        grid.innerHTML = "";
        if (!pid || !total) return;
        if (invListener) { invListener(); invListener = null; }

        invListener = onSnapshot(collection(db, "projects", pid, "plots"), snap => {
            const statusMap = {};
            snap.forEach(d => { statusMap[d.id] = d.data().status; });
            grid.innerHTML = "";
            for (let i = 1; i <= total; i++) {
                const s   = statusMap[String(i)] || 'available';
                const div = document.createElement('div');
                div.className = `plot-box ${s}`;
                div.innerText = i;
                div.onclick = () => {
                    setDoc(doc(db, "projects", pid, "plots", String(i)), {
                        status: s === 'available' ? 'sold' : 'available'
                    });
                };
                grid.appendChild(div);
            }
        });
    };

    // ── Web Enquiries ──────────────────────────────────────────────
    onSnapshot(query(collection(db, "enquiries"), orderBy("timestamp", "desc")), snap => {
        const body = document.getElementById('enquiryTableBody');
        body.innerHTML = "";
        snap.forEach(d => {
            const e = d.data();
            body.innerHTML += `
                <tr>
                    <td>${e.name    || '—'}</td>
                    <td>${e.phone   || '—'}</td>
                    <td>${e.project || '—'}</td>
                    <td>${e.plot    || '—'}</td>
                </tr>`;
        });
    });

</script>
</body>
</html>
