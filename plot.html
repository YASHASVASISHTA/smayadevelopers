<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Plot | Smaya Developers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brown: #1A2C3E;
            --brown-dark: #0F1D2E;
            --brown-medium: #2c4258;
            --gold: #FFD700;
            --gold-light: #FFF44F;
            --cream: #F5F3F0;
            --white: #ffffff;
            --available: #25D366;
            --sold: #ef4444;
            --shadow: 0 4px 32px rgba(26, 44, 62, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            color: var(--brown);
            line-height: 1.6;
        }

        /* NAVBAR */
        .navbar {
            background: var(--brown);
            padding: 15px 0;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo img { height: 50px; }
        .back-btn {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0F1D2E 0%, var(--brown) 100%);
            color: var(--white);
            padding: 60px 0;
            text-align: center;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .gold-text { color: var(--gold); }

        /* CONTAINER */
        .container { max-width: 1100px; margin: -40px auto 60px; padding: 0 24px; }
        
        .booking-card {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .selection-group { margin-bottom: 30px; text-align: center; }
        select {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid var(--cream);
            border-radius: 50px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        /* PROJECT MAP */
        #projectMapContainer {
            display: none;
            margin: 30px 0;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            background: #fff;
            position: relative;
            cursor: zoom-in;
        }
        #projectMapImg { width: 100%; max-height: 500px; object-fit: contain; }

        /* GRID */
        .grid-header { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .legend { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        .box.avail { background: rgba(37, 211, 102, 0.1); border: 1px solid var(--available); }
        .box.sold { background: #fee2e2; border: 1px solid var(--sold); }

        .plot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 12px;
        }
        .plot-unit {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .plot-unit.available { background: rgba(37, 211, 102, 0.1); color: var(--available); border-color: var(--available); }
        .plot-unit.sold { background: #fee2e2; color: var(--sold); border-color: #fecaca; cursor: not-allowed; opacity: 0.6; }
        .plot-unit.selected { background: var(--gold); color: var(--brown-dark); transform: scale(1.1); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); border-color: var(--brown); }

        /* FORM */
        #bookingSection { display: none; margin-top: 40px; border-top: 1px solid #eee; padding-top: 40px; }
        .summary-box { background: var(--brown-dark); color: var(--white); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-family: inherit; }
        .btn-book { width: 100%; background: var(--gold); color: var(--brown-dark); padding: 16px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }

        /* LIGHTBOX */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90%; max-height: 90%; }

        /* SUCCESS MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 29, 46, 0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-ui { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 450px; width: 90%; }
        .success-icon { width: 60px; height: 60px; background: var(--available); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo"><img src="LOGO.PNG" alt="Smaya Logo"></a>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Reserve Your <span class="gold-text">Dream Plot</span></h1>
            <p>Select a project and pick your preferred location</p>
        </div>
    </section>

    <div class="container">
        <div class="booking-card">
            <div class="selection-group">
                <label style="display:block; margin-bottom:10px; font-weight:600;">Choose Project</label>
                <select id="projectSelect">
                    <option value="">-- Loading Projects... --</option>
                </select>
            </div>

            <div id="projectMapContainer" onclick="openLightbox()">
                <img id="projectMapImg" src="" alt="Plot Layout Map">
                <div style="font-size: 11px; margin-top:10px; color: var(--brown-medium);">
                    <i class="fas fa-search-plus"></i> Tap layout to enlarge
                </div>
            </div>

            <div id="gridSection" style="display:none;">
                <div class="grid-header">
                    <div class="legend"><div class="box avail"></div> Available</div>
                    <div class="legend"><div class="box sold"></div> Sold</div>
                </div>
                <div class="plot-grid" id="plotGrid"></div>
            </div>

            <div id="bookingSection">
                <div class="summary-box">
                    <h3 style="color: var(--gold); margin-bottom: 10px;">Your Selection</h3>
                    <div class="summary-item"><span>Project:</span> <strong id="sumProject">-</strong></div>
                    <div class="summary-item"><span>Plot No:</span> <strong id="sumPlot">-</strong></div>
                </div>
                <form id="enquiryForm">
                    <input type="text" id="custName" placeholder="Your Full Name" required>
                    <input type="tel" id="custPhone" placeholder="Mobile Number" required>
                    <button type="submit" class="btn-book" id="submitBtn">Confirm Interest</button>
                </form>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightboxImg" src="">
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-ui">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2>Request Received!</h2>
            <p id="modalMsg">We have received your interest. Our executive will contact you shortly.</p>
            <br>
            <a href="index.html" style="color: var(--brown); font-weight:600; text-decoration:none;">Return to Home</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, onSnapshot, addDoc, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Setup Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBizlZkXOH8TUjXrlqShfcaclYQHUI352c",
            authDomain: "dark-valor-452618-u5.firebaseapp.com",
            projectId: "dark-valor-452618-u5",
            storageBucket: "dark-valor-452618-u5.firebasestorage.app",
            messagingSenderId: "216503837658",
            appId: "1:216503837658:web:e0bda55bfbf27cddbf16e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let projects = {};
        let selectedProjId = "";
        let selectedPlotNum = "";
        let plotUnsub = null;

        // 2. Load Projects into Dropdown
        onSnapshot(collection(db, "projects"), (snap) => {
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Choose Project --</option>';
            snap.forEach(doc => {
                const data = doc.data();
                projects[doc.id] = data;
                select.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
            });
        });

        // 3. Handle Project Selection
        document.getElementById('projectSelect').onchange = (e) => {
            selectedProjId = e.target.value;
            const mapContainer = document.getElementById('projectMapContainer');
            const gridSection = document.getElementById('gridSection');
            document.getElementById('bookingSection').style.display = "none";

            if (plotUnsub) plotUnsub(); // Clear previous project listener

            if (selectedProjId) {
                const p = projects[selectedProjId];
                // Display Project Plot Image
                document.getElementById('projectMapImg').src = p.plotImg || 'https://via.placeholder.com/800x400?text=No+Map+Provided';
                mapContainer.style.display = "block";
                gridSection.style.display = "block";

                // Listen to plot availability for THIS project
                plotUnsub = onSnapshot(collection(db, "projects", selectedProjId, "plots"), (snap) => {
                    const statusMap = {};
                    snap.forEach(d => statusMap[d.id] = d.data().status);
                    
                    renderGrid(p.sites, statusMap);
                });
            } else {
                mapContainer.style.display = "none";
                gridSection.style.display = "none";
            }
        };

        // 4. Render the Plot Grid
        function renderGrid(total, statusMap) {
            const grid = document.getElementById('plotGrid');
            grid.innerHTML = "";
            for (let i = 1; i <= total; i++) {
                const status = statusMap[String(i)] || 'available';
                const unit = document.createElement('div');
                unit.className = `plot-unit ${status}`;
                unit.innerText = i;
                
                if (status === 'available') {
                    unit.onclick = () => {
                        document.querySelectorAll('.plot-unit').forEach(u => u.classList.remove('selected'));
                        unit.classList.add('selected');
                        selectedPlotNum = i;
                        showBookingForm();
                    };
                }
                grid.appendChild(unit);
            }
        }

        function showBookingForm() {
            document.getElementById('bookingSection').style.display = "block";
            document.getElementById('sumProject').innerText = projects[selectedProjId].name;
            document.getElementById('sumPlot').innerText = "#" + selectedPlotNum;
            document.getElementById('bookingSection').scrollIntoView({ behavior: 'smooth' });
        }

        // 5. Submit Enquiry to Database
        document.getElementById('enquiryForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const enquiry = {
                    name: document.getElementById('custName').value,
                    phone: document.getElementById('custPhone').value,
                    project: projects[selectedProjId].name,
                    projectId: selectedProjId,
                    plot: selectedPlotNum,
                    timestamp: serverTimestamp()
                };

                // Add to 'enquiries' collection for Admin view
                await addDoc(collection(db, "enquiries"), enquiry);

                document.getElementById('modalMsg').innerHTML = `Your interest for <b>${enquiry.project} (Plot #${selectedPlotNum})</b> has been recorded. Our team will contact you at ${enquiry.phone}.`;
                document.getElementById('successModal').style.display = "flex";
            } catch (err) {
                alert("Error submitting request: " + err.message);
                btn.disabled = false;
                btn.innerText = "Confirm Interest";
            }
        };

        window.openLightbox = () => {
            const src = document.getElementById('projectMapImg').src;
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').style.display = "flex";
        };
    </script>
</body>
</html>
