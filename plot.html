<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Plot | Smaya Developers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brown: #1A2C3E;
            --brown-dark: #0F1D2E;
            --brown-medium: #2c4258;
            --gold: #FFD700;
            --gold-light: #FFF44F;
            --cream: #F5F3F0;
            --white: #ffffff;
            --available: #25D366;
            --sold: #ef4444;
            --shadow: 0 4px 32px rgba(26, 44, 62, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            color: var(--brown);
            line-height: 1.6;
        }

        /* NAVBAR */
        .navbar {
            background: var(--brown);
            padding: 15px 0;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo img { height: 50px; }
        .back-btn {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0F1D2E 0%, var(--brown) 100%);
            color: var(--white);
            padding: 60px 0;
            text-align: center;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .gold-text { color: var(--gold); }

        /* CONTAINER */
        .container { max-width: 1100px; margin: -40px auto 60px; padding: 0 24px; }
        
        .booking-card {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .selection-group { margin-bottom: 30px; text-align: center; }
        select {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid var(--cream);
            border-radius: 50px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        /* ZOOMABLE MAP CONTAINER */
        #projectMapContainer {
            display: none;
            margin: 30px 0;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            background: #fff;
            position: relative;
            cursor: zoom-in;
            transition: transform 0.3s;
        }
        #projectMapContainer:hover { border-color: var(--gold); }
        #projectMapContainer img { width: 100%; max-height: 400px; object-fit: contain; }
        .zoom-hint { 
            font-size: 11px; 
            color: var(--gold); 
            background: var(--brown); 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            margin-top: 10px;
            font-weight: 600;
        }

        /* LIGHTBOX MODAL */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .close-lightbox {
            position: absolute;
            top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
        }

        /* GRID */
        .grid-header { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .legend { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        .box.avail { background: var(--available); }
        .box.sold { background: var(--sold); }

        .plot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 12px;
        }
        .plot-unit {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .plot-unit.available { background: rgba(37, 211, 102, 0.1); color: var(--available); border-color: var(--available); }
        .plot-unit.sold { background: #fee2e2; color: var(--sold); border-color: #fecaca; cursor: not-allowed; }
        .plot-unit.selected { background: var(--gold); color: var(--brown-dark); transform: scale(1.1); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }

        /* FORM */
        #bookingSection { display: none; margin-top: 40px; border-top: 1px solid #eee; padding-top: 40px; }
        .summary-box { background: var(--brown-dark); color: var(--white); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-family: inherit; }
        .btn-book { width: 100%; background: var(--gold); color: var(--brown-dark); padding: 16px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }

        /* SUCCESS MODAL UI */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 29, 46, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-ui {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .modal-overlay.active .modal-ui { transform: translateY(0); opacity: 1; }
        
        .success-icon {
            width: 80px; height: 80px; background: var(--available); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        .modal-ui h2 { font-family: 'Playfair Display', serif; color: var(--brown); margin-bottom: 10px; }
        .modal-ui p { color: var(--brown-medium); font-size: 15px; margin-bottom: 25px; }
        .btn-done { background: var(--brown); color: var(--gold); padding: 12px 40px; border-radius: 50px; font-weight: 600; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-done:hover { background: var(--brown-dark); transform: scale(1.05); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo"><img src="LOGO.PNG" alt="Smaya Logo"></a>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Reserve Your <span class="gold-text">Dream Plot</span></h1>
            <p>Select a project and pick your preferred location on the map</p>
        </div>
    </section>

    <div class="container">
        <div class="booking-card">
            <div class="selection-group">
                <label>Select Project</label>
                <select id="projectSelect" onchange="handleProjectChange()">
                    <option value="">-- Choose Project --</option>
                    <option value="heights">Vijayanagar Heights</option>
                    <option value="valley">Green Valley Estate</option>
                    <option value="plaza">Platinum Plaza</option>
                </select>
            </div>

            <div id="projectMapContainer" onclick="openLightbox()">
                <img id="projectMapImg" src="" alt="Map">
                <div class="zoom-hint"><i class="fas fa-search-plus"></i> Tap to View Full Map</div>
            </div>

            <div id="gridSection" style="display:none;">
                <div class="grid-header">
                    <div class="legend"><div class="box avail"></div> Available</div>
                    <div class="legend"><div class="box sold"></div> Sold</div>
                </div>
                <div class="plot-grid" id="plotGrid"></div>
            </div>

            <div id="bookingSection">
                <div class="summary-box">
                    <h3 style="color: var(--gold); margin-bottom: 10px;">Booking Details</h3>
                    <div class="summary-item"><span>Project:</span> <strong id="sumProject">-</strong></div>
                    <div class="summary-item"><span>Plot No:</span> <strong id="sumPlot">-</strong></div>
                </div>
                <form onsubmit="handleFinalSubmit(event)">
                    <input type="text" id="custName" placeholder="Full Name" required>
                    <input type="tel" id="custPhone" placeholder="Mobile Number" required>
                    <button type="submit" class="btn-book">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-ui">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 id="modalTitle">Request Received!</h2>
            <p id="modalMsg">Your interest in the plot has been recorded. Our executive will contact you shortly.</p>
            <a href="index.html" class="btn-done">Return Home</a>
        </div>
    </div>

    <script>
        const projectData = {
            heights: { name: "Vijayanagar Heights", map: "img1.png", total: 40, sold: [2, 5, 12, 30] },
            valley: { name: "Green Valley Estate", map: "img1.jpeg", total: 30, sold: [1, 10, 20] },
            plaza: { name: "Platinum Plaza", map: "IMG2.png", total: 20, sold: [5, 15] }
        };

        let currentProj = "", currentPlot = "";

        // Handle Selection Change
        function handleProjectChange() {
            const val = document.getElementById('projectSelect').value;
            const gridSection = document.getElementById('gridSection');
            const mapContainer = document.getElementById('projectMapContainer');
            document.getElementById('bookingSection').style.display = "none";

            if(val) {
                currentProj = projectData[val].name;
                const mapPath = projectData[val].map;
                
                document.getElementById('projectMapImg').src = mapPath;
                document.getElementById('lightboxImg').src = mapPath; // Preload lightbox image

                mapContainer.style.display = "block";
                gridSection.style.display = "block";
                
                const grid = document.getElementById('plotGrid');
                grid.innerHTML = "";
                for(let i=1; i<=projectData[val].total; i++) {
                    const isSold = projectData[val].sold.includes(i);
                    const unit = document.createElement('div');
                    unit.className = `plot-unit ${isSold ? 'sold' : 'available'}`;
                    unit.innerText = i;
                    if(!isSold) unit.onclick = () => {
                        document.querySelectorAll('.plot-unit').forEach(u => u.classList.remove('selected'));
                        unit.classList.add('selected');
                        currentPlot = i;
                        document.getElementById('bookingSection').style.display = "block";
                        document.getElementById('sumProject').innerText = currentProj;
                        document.getElementById('sumPlot').innerText = "#" + i;
                        document.getElementById('bookingSection').scrollIntoView({behavior:'smooth'});
                    };
                    grid.appendChild(unit);
                }
            }
        }

        // Lightbox Functions
        function openLightbox() {
            document.getElementById('lightbox').style.display = "flex";
            document.body.style.overflow = "hidden"; // Disable scroll
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = "none";
            document.body.style.overflow = "auto"; // Re-enable scroll
        }

        // Final Submission
        function handleFinalSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('custName').value;
            document.getElementById('modalTitle').innerText = `Thank you, ${name}!`;
            document.getElementById('modalMsg').innerHTML = `Your booking interest for <strong>${currentProj} (Plot #${currentPlot})</strong> has been successfully sent. We will call you within 24 hours.`;
            
            const modal = document.getElementById('successModal');
            modal.style.display = "flex";
            setTimeout(() => modal.classList.add('active'), 10);
        }
    </script>
</body>
</html>
